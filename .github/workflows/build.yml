name: Build OpenWRT Packages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Feed
      uses: actions/checkout@v4

    - name: Cache Go Modules
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Build Packages and Index
      run: |
        # Pre-create artifacts and set permissions
        mkdir -p artifacts
        chmod -R a+rwX artifacts
        
        docker run --rm -v ${{ github.workspace }}:/custom_feed -e GOCACHE=/custom_feed/.gocache openwrt/sdk:aarch64_cortex-a53-snapshot bash -c "
          # Update and install feeds (must include 'packages' for golang-package.mk)
          ./scripts/feeds update -a
          ./scripts/feeds install golang
          
          # Add and install custom feed
          echo 'src-link custom /custom_feed' >> feeds.conf.default
          ./scripts/feeds update custom
          ./scripts/feeds install -a
          
          # Build packages
          make defconfig
          make package/blackhole/compile V=s || (echo 'Build failed' && exit 1)
          make package/luci-app-blackhole/compile V=s || (echo 'LuCI app build failed' && exit 1)
          
          # Index packages
          [ -x ./staging_dir/host/bin/usign ] && [ ! -f key-build ] && ./staging_dir/host/bin/usign -G -s ./key-build -p ./key-build.pub -c 'Build key'
          make package/index V=s CONFIG_SIGNED_PACKAGES=
          
          # Copy artifacts (ensure we only copy what we built)
          mkdir -p /custom_feed/artifacts/aarch64_cortex-a53
          cp -v bin/packages/aarch64_cortex-a53/custom/* /custom_feed/artifacts/aarch64_cortex-a53/
          
          # Final check: fail if index is empty
          [ -s /custom_feed/artifacts/aarch64_cortex-a53/Packages ] || (echo 'Package index is empty!' && exit 1)
          
          # List files for verification
          echo 'Contents of artifacts:'
          ls -lh /custom_feed/artifacts/aarch64_cortex-a53/
        "

    - name: Setup Pages
      uses: actions/configure-pages@v4
      with:
        enablement: true

    - name: Upload Pages Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'artifacts'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
