name: Build OpenWRT Packages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Feed
      uses: actions/checkout@v4

    - name: Build Packages and Index
      run: |
        docker run --rm -v ${{ github.workspace }}:/custom_feed openwrt/sdk:aarch64_cortex-a53-snapshot bash -c "
          echo 'src-link custom /custom_feed' >> feeds.conf.default &&
          ./scripts/feeds update custom &&
          ./scripts/feeds install blackhole luci-app-blackhole &&
          make defconfig &&
          make package/blackhole/compile V=s &&
          make package/luci-app-blackhole/compile V=s &&
          make package/index V=s &&
          mkdir -p /custom_feed/artifacts &&
          cp -r bin/packages/* /custom_feed/artifacts/ || true
        "

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload Pages Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'artifacts'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
