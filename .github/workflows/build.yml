name: Build OpenWRT Packages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: openwrt/sdk:aarch64_cortex-a53-snapshot
    
    steps:
    - name: Checkout Feed
      uses: actions/checkout@v4
      with:
        path: custom_feed

    - name: Setup Build Environment
      run: |
        sudo chown -R buildbot:buildbot .
        echo "src-link custom /builder/workspace/custom_feed" >> feeds.conf.default
        ./scripts/feeds update custom
        ./scripts/feeds install blackhole luci-app-blackhole
        make defconfig

    - name: Build Packages and Index
      run: |
        make package/blackhole/compile V=s
        make package/luci-app-blackhole/compile V=s
        make package/index V=s

    - name: Collect Artifacts
      run: |
        mkdir -p /builder/workspace/artifacts
        cp -r bin/packages/*/custom/* /builder/workspace/artifacts/ || true

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload Pages Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '/builder/workspace/artifacts'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

