name: Build OpenWRT Packages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Feed
      uses: actions/checkout@v4

    - name: Cache OpenWRT Downloads (dl)
      uses: actions/cache@v4
      with:
        path: workspace_cache/dl
        key: openwrt-dl-${{ runner.os }}

    - name: Cache OpenWRT Feeds
      uses: actions/cache@v4
      with:
        path: workspace_cache/feeds
        key: openwrt-feeds-${{ runner.os }}-${{ github.sha }}
        restore-keys: |
          openwrt-feeds-${{ runner.os }}-

    - name: Cache OpenWRT Host Tools (Go Compiler)
      uses: actions/cache@v4
      with:
        path: workspace_cache/staging_dir_host
        key: openwrt-host-${{ runner.os }}-${{ github.sha }}
        restore-keys: |
          openwrt-host-${{ runner.os }}-

    - name: Cache Go build cache
      uses: actions/cache@v4
      with:
        path: .gocache
        key: openwrt-gocache-${{ runner.os }}-${{ hashFiles('**/go.mod') }}
        restore-keys: |
          openwrt-gocache-${{ runner.os }}-

    - name: Build Packages and Index
      run: |
        # Pre-create artifacts and workspace cache directories to avoid Docker permission issues
        mkdir -p artifacts workspace_cache/dl workspace_cache/feeds workspace_cache/staging_dir_host .gocache
        chmod -R a+rwX artifacts workspace_cache .gocache
        
        docker run --rm -v ${{ github.workspace }}:/custom_feed -e GOCACHE=/custom_feed/.gocache openwrt/sdk:aarch64_cortex-a53-snapshot bash -c "
          set -e
          
          function save_cache {
            echo '--- CACHE SAVE PHASE ---'
            echo 'Extracting caches out of SDK...'
            mkdir -p /custom_feed/workspace_cache/dl /custom_feed/workspace_cache/feeds /custom_feed/workspace_cache/staging_dir_host
            cp -a ./dl/* /custom_feed/workspace_cache/dl/ 2>/dev/null || true
            cp -a ./feeds/* /custom_feed/workspace_cache/feeds/ 2>/dev/null || true
            cp -a ./staging_dir/host/* /custom_feed/workspace_cache/staging_dir_host/ 2>/dev/null || true
            echo 'Caches extracted.'
          }
          trap save_cache EXIT

          # --- CACHE RESTORE PHASE ---
          echo 'Restoring caches into SDK...'
          cp -a /custom_feed/workspace_cache/dl/* ./dl/ 2>/dev/null || true
          cp -a /custom_feed/workspace_cache/feeds/* ./feeds/ 2>/dev/null || true
          cp -a /custom_feed/workspace_cache/staging_dir_host/* ./staging_dir/host/ 2>/dev/null || true
          
          # Build PHASE
          rm -rf bin/packages
          
          # Update required feeds
          ./scripts/feeds update packages luci
          ./scripts/feeds install golang
          
          # Force link into include
          mkdir -p include
          ln -sf ../feeds/packages/lang/golang/golang-package.mk include/golang-package.mk
          ln -sf ../feeds/packages/lang/golang/golang-values.mk include/golang-values.mk
          
          echo 'src-link custom /custom_feed' >> feeds.conf.default
          ./scripts/feeds update custom
          ./scripts/feeds install blackhole luci-app-blackhole
          
          # Initialize config - only select our packages
          # We use oldconfig instead of defconfig to see if it bypasses some checks,
          # but we need a baseline.
          [ -f .config ] || make defconfig
          ./scripts/config --enable PACKAGE_blackhole
          ./scripts/config --enable PACKAGE_luci-app-blackhole
          # No need to enable golang manually if blackhole depends on it, 
          # but we need it for Build/Compile.
          ./scripts/config --enable PACKAGE_golang
          make oldconfig
          
          # Build golang host tools
          make package/golang/compile V=s || { echo 'Golang build failed'; exit 1; }
          
          # List some environment info
          echo \"Staging host bin contents:\"
          ls staging_dir/host/bin/ | grep go || true
          
          # Build packages
          make package/blackhole/compile V=s || { echo 'Blackhole build failed'; exit 1; }
          make package/luci-app-blackhole/compile V=s || { echo 'LuCI app build failed'; exit 1; }

          # Index packages
          [ -x ./staging_dir/host/bin/usign ] && [ ! -f key-build ] && ./staging_dir/host/bin/usign -G -s ./key-build -p ./key-build.pub -c 'Build key'
          make package/index V=s CONFIG_SIGNED_PACKAGES=
          
          # Copy artifacts
          mkdir -p /custom_feed/artifacts/aarch64_cortex-a53
          cp -v /custom_feed/index.html /custom_feed/artifacts/index.html
          
          # Find our specific IPKs and move them
          find bin/packages -name 'blackhole*.ipk' -exec cp -v {} /custom_feed/artifacts/aarch64_cortex-a53/ \;
          find bin/packages -name 'luci-app-blackhole*.ipk' -exec cp -v {} /custom_feed/artifacts/aarch64_cortex-a53/ \;
          
          # Copy the index files specifically from the custom feed output
          find bin/packages -name 'Packages*' -exec cp -v {} /custom_feed/artifacts/aarch64_cortex-a53/ \;
          cd /custom_feed/artifacts/aarch64_cortex-a53/
          [ -f Packages.gz ] && cp Packages.gz APKINDEX.tar.gz
          
          # Final check: fail if no IPKs found
          ls *.ipk || { echo 'No IPK files found!'; exit 1; }
          # Verify index is not empty
          [ -s Packages ] || { echo 'Packages index is empty!'; exit 1; }
          
          # List files for verification
          echo 'Contents of artifacts:'
          ls -lh /custom_feed/artifacts/aarch64_cortex-a53/
        "

    - name: Setup Pages
      uses: actions/configure-pages@v4
      with:
        enablement: true

    - name: Upload Pages Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'artifacts'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
