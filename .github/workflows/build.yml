name: Build OpenWRT Packages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Feed
      uses: actions/checkout@v4

    - name: Build Packages and Index
      run: |
        mkdir -p artifacts
        docker run --rm -v ${{ github.workspace }}:/custom_feed openwrt/sdk:aarch64_cortex-a53-snapshot bash -c "
          # Update and install all feeds to get golang infrastructure
          ./scripts/feeds update -a &&
          ./scripts/feeds install -a &&
          
          # Add custom feed
          echo 'src-link custom /custom_feed' >> feeds.conf.default &&
          ./scripts/feeds update custom &&
          ./scripts/feeds install blackhole luci-app-blackhole &&
          
          # Configure and build
          make defconfig &&
          make package/blackhole/compile V=s &&
          make package/luci-app-blackhole/compile V=s &&
          make package/index V=s &&
          
          # Copy everything to the mounted volume, maintaining arch folder but removing 'custom' subfolder
          mkdir -p /custom_feed/artifacts/aarch64_cortex-a53
          cp -r bin/packages/aarch64_cortex-a53/custom/* /custom_feed/artifacts/aarch64_cortex-a53/
        "

    - name: Setup Pages
      uses: actions/configure-pages@v4
      with:
        enablement: true

    - name: Upload Pages Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'artifacts'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
